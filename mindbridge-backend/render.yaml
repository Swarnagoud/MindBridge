services:
  - type: web
    name: mindbridge-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GROK_API_KEY
        sync: false
      - key: PORT
        value: 5000
